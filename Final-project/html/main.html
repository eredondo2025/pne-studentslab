<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome!!</title>
</head>
<body style="background-color: #ffffdd; font-family: Arial; margin: 30px;">

    <h1>Browsing Human and Vertebrates genome</h1>
    <h2>BASIC Level Services</h2>

    <form action="/listSpecies" method="GET">
        <p><strong>1)List of species in the genome database</strong></p>
        <label>Limit : </label>
        <input type="text" name="limit">
        <br>
        <input type="submit" value="Send">
    </form>

    <form action="/karyotype" method="GET">
        <p><strong>2)Information about the karyotype :</strong></p>
        <label>Select the species : </label>
        <input type="text" name="species" required>
        <br>
        <input type="submit" value="Send">
    </form>

    <form action="/chromosomeLength" method="GET">
        <p><strong>3)Chromosome Length</strong></p>
        <label>Select the species : </label>
        <input type="text" name="species" required>
        <br>
        <label>Select a chromosome : </label>
        <input type="text" name="chromo" required>
        <br>
        <input type="submit" value="Send">
    </form>

</body>
</html>
