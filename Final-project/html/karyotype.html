<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Karyotype Information</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f6f9; }
        h1 { color: #2c3e50; }
        .chromosome-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .chromosome-badge { background-color: #3498db; color: white; padding: 8px 15px; border-radius: 4px; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 20px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Karyotype for Species: <span style="color:#e74c3c;">{species_name}</span></h1>
    <p>Chromosomes found in current assembly:</p>
    <div class="chromosome-container">
        {chromosome_badges}
    </div>
    <br>
    <a class="back-link" href="/">&larr; Back to Main Portal</a>
</body>
</html>
