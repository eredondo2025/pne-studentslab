<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chromosome Length</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f6f9; }
        .result-box { background-color: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; }
        h1 { color: #2c3e50; margin-top: 0; }
        .stat { font-size: 18px; margin: 10px 0; }
        .highlight { font-weight: bold; color: #27ae60; }
        .back-link { display: inline-block; margin-top: 20px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="result-box">
        <h1>Chromosome Dimension</h1>
        <p class="stat">Species: <strong>{species_name}</strong></p>
        <p class="stat">Chromosome Target: <strong>{chromosome_id}</strong></p>
        <p class="stat">Total Length: <span class="highlight">{chromosome_length} base pairs (bp)</span></p>
        <a class="back-link" href="/">&larr; Back to Main Portal</a>
    </div>
</body>
</html>
